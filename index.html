        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }

    <!-- Contenido -->

                            <button onclick="setAIMode('critical')" id="mode-critical" class="ai-mode-btn flex-1 py-2 text-[10px] font-bold bg-slate-100 text-slate-500 rounded-xl hover:bg-slate-200 transition-all">CRÍTICO</button>
                        </div>

                        <textarea id="ai-query" placeholder="¿En qué puedo ayudarte hoy?" class="w-full text-sm border-none bg-slate-50 rounded-2xl p-4 h-28 focus:ring-2 focus:ring-teal-500 outline-none mb-4 transition-all resize-none"></textarea>
                        
                        <button onclick="generateAICounsel()" id="ai-btn" class="w-full ai-gradient text-white py-4 rounded-2xl font-bold text-sm shadow-xl hover:shadow-teal-200 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-3">

                            <div class="mt-4 flex justify-between items-center">
                                <button onclick="saveCounsel()" class="text-[10px] font-bold text-teal-600 hover:text-teal-800 uppercase tracking-widest"><i class="far fa-bookmark mr-1"></i> Guardar</button>

                    <!-- Bitácora de Sabiduría (Historial local) -->

                        <div class="relative z-10">
                            <h4 class="text-xs font-bold text-teal-400 uppercase tracking-[0.2em] mb-4">Bitácora Reciente</h4>
                            <div id="history-list" class="space-y-3 max-h-48 overflow-y-auto pr-2 custom-scrollbar"></div>

        </div>

        <!-- OTRAS SECCIONES (IGUALES AL ANTERIOR) -->
        <div id="section-publicar" class="page-section hidden fade-in">
             <div class="max-w-3xl mx-auto bg-white p-10 md:p-16 rounded-[3rem] border border-slate-100 shadow-2xl">
                <div class="text-center mb-12">
                    <span class="text-orange-500 font-bold uppercase text-[10px] tracking-[0.3em]">Colaboración Abierta</span>
                    <h2 class="text-5xl font-bold serif mt-3 text-slate-900">Tu voz importa</h2>
                </div>
                <form id="form-publicar" class="space-y-8" onsubmit="handlePublish(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                        <select id="pub-cat" class="w-full border-b-2 border-slate-100 p-3 outline-none focus:border-teal-500 bg-transparent">
                            <option value="general">Sabiduría General</option>
                            <option value="health">Salud</option>
                            <option value="business">Finanzas</option>
                            <option value="technology">Tecnología</option>
                        </select>
                    </div>
                    <input type="text" id="pub-author" required placeholder="Tu Nombre" class="w-full border-b-2 border-slate-100 p-3 outline-none focus:border-teal-500 bg-transparent">
                    <textarea id="pub-text" required placeholder="Escribe aquí..." class="w-full border border-slate-100 bg-slate-50 p-6 rounded-3xl h-64 outline-none focus:border-teal-500"></textarea>
                    <button type="submit" class="w-full ai-gradient text-white font-bold py-5 rounded-3xl shadow-xl">Publicar Conocimiento</button>

            <span class="text-3xl font-bold serif text-teal-400">Sapiens<span class="text-orange-500">.</span></span>
            <p class="text-slate-500 mt-4 text-sm">© 2026 Inteligencia Aplicada para la Vida Moderna.</p>
        </div>
    </footer>

    <script>
        const API_KEY = ""; 
        let currentArticles = [];
        let userArticles = [];
        let aiMode = 'practical';
        let lastResponse = "";

        // --- MOTOR IA MEJORADO ---

        async function callGemini(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`;
            const payload = { 
                contents: [{ parts: [{ text: prompt }] }], 
                systemInstruction: { parts: [{ text: systemInstruction }] } 
            };
            
            let retries = 0;
            const maxRetries = 3;
            
            while(retries < maxRetries) {
                try {
                    const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    retries++;
                    await new Promise(r => setTimeout(r, 1000 * retries));
                }
            }
            return "El oráculo está meditando. Por favor, intenta de nuevo en un momento.";
        }

        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY}`;
            const payload = { instances: { prompt: `A sophisticated, minimalist artistic illustration for: ${prompt}. Cinematic lighting, soft teal and amber tones, high quality, editorial style.` }, parameters: { sampleCount: 1 } };
            
            try {
                const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            } catch (e) { return null; }
        }

        function setAIMode(mode) {
            aiMode = mode;
            document.querySelectorAll('.ai-mode-btn').forEach(b => {
                b.classList.remove('bg-teal-600', 'text-white');
                b.classList.add('bg-slate-100', 'text-slate-500');
            });
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.classList.remove('bg-slate-100', 'text-slate-500');
            activeBtn.classList.add('bg-teal-600', 'text-white');
        }

        async function generateAICounsel() {
            const query = document.getElementById('ai-query').value.trim();
            if (!query) return;

            const loading = document.getElementById('ai-loading');
            const container = document.getElementById('ai-response-container');
            const textDiv = document.getElementById('ai-response-text');
            const imgContainer = document.getElementById('ai-image-container');
            const imgEl = document.getElementById('ai-generated-img');
            const btn = document.getElementById('ai-btn');

            loading.classList.remove('hidden');
            container.classList.add('hidden');
            btn.disabled = true;

            const instructions = {
                practical: "Eres un mentor pragmático. Da consejos directos, accionables y con pasos numerados.",
                philosophical: "Eres un sabio estoico. Responde con metáforas, profundidad existencial y calma.",
                critical: "Eres un consultor escéptico. Analiza los riesgos, los puntos débiles y da una opinión honesta aunque sea dura."
            };

            // Llamadas paralelas para optimizar tiempo
            const [advice, imageUrl] = await Promise.all([
                callGemini(query, instructions[aiMode]),
                generateImage(query)
            ]);

            lastResponse = advice;
            textDiv.innerHTML = advice.replace(/\n/g, '<br>');
            
            if (imageUrl) {
                imgEl.src = imageUrl;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            loading.classList.add('hidden');
            container.classList.remove('hidden');
            btn.disabled = false;
        }

        function saveCounsel() {
            const query = document.getElementById('ai-query').value;
            const historyList = document.getElementById('history-list');
            const historySection = document.getElementById('ai-history');
            
            historySection.classList.remove('hidden');
            const item = document.createElement('div');
            item.className = 'text-[11px] p-3 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 cursor-pointer transition';
            item.innerHTML = `<span class="text-teal-400 font-bold block mb-1">Q: ${query.substring(0, 30)}...</span> <span class="text-slate-400">${new Date().toLocaleTimeString()}</span>`;
            item.onclick = () => {
                document.getElementById('ai-query').value = query;
                document.getElementById('ai-response-text').innerHTML = lastResponse.replace(/\n/g, '<br>');
                document.getElementById('ai-response-container').classList.remove('hidden');
            };
            historyList.prepend(item);
        }

        function clearAI() {
            document.getElementById('ai-query').value = "";
            document.getElementById('ai-response-container').classList.add('hidden');
        }

        // --- GESTIÓN DE CONTENIDO ---

        function handlePublish(e) {
            e.preventDefault();
            const title = document.getElementById('pub-title').value;
            const text = document.getElementById('pub-text').value;
            const cat = document.getElementById('pub-cat').value;

            const newArticle = {
                title,
                description: text.substring(0, 150) + "...",
                source: { name: document.getElementById('pub-author').value },
                image: `https://images.unsplash.com/photo-${Math.floor(Math.random()*1000000)}?auto=format&fit=crop&q=80&w=800`,
                fullText: text.split('\n').map(p => `<p>${p}</p>`).join(''),
                category: cat,
                isUserPost: true
            };

            userArticles.unshift(newArticle);
            loadCategory(cat);
        }

        function renderArticles(articles) {
            currentArticles = articles;
            const grid = document.getElementById('news-grid');
            document.getElementById('article-count').innerText = `${articles.length} RECURSOS`;
            grid.innerHTML = '';

            articles.forEach((art, i) => {
                grid.innerHTML += `
                    <article class="group md:flex items-center gap-10">
                        <div class="md:w-5/12 overflow-hidden rounded-[2rem] aspect-[4/3] shadow-lg">
                            <img class="h-full w-full object-cover group-hover:scale-110 transition-transform duration-700" src="${art.image}">
                        </div>
                        <div class="md:w-7/12 py-4">
                            <div class="flex items-center space-x-3 mb-4">
                                <span class="text-[9px] ${art.isUserPost ? 'bg-orange-100 text-orange-600' : 'bg-teal-50 text-teal-600'} font-bold uppercase tracking-widest px-3 py-1 rounded-full">
                                    ${art.isUserPost ? 'Comunidad' : art.source.name}
                                </span>
                            </div>
                            <h3 class="text-3xl font-bold serif mb-4 text-slate-900 leading-snug">${art.title}</h3>
                            <p class="text-slate-500 text-sm line-clamp-2 mb-6">${art.description}</p>
                            <button onclick="readMore(${i})" class="text-slate-900 font-bold text-xs border-b-2 border-orange-400 pb-1 hover:text-teal-700 hover:border-teal-700 transition-all uppercase tracking-widest">Ver Guía</button>
                        </div>
                    </article>
                `;
            });
        }

        function readMore(index) {
            const art = currentArticles[index];
            const container = document.getElementById('full-article-content');
            container.innerHTML = `
                <button onclick="showSection('home')" class="mb-8 font-bold text-xs text-teal-600 uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                <img src="${art.image}" class="w-full h-[450px] object-cover rounded-[3rem] shadow-2xl mb-12">
                <h1 class="text-5xl font-bold serif mb-8 text-slate-900">${art.title}</h1>
                <div class="article-content">${art.fullText}</div>
            `;
            showSection('article');
        }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
        }

        function getMockArticles(cat) {
            const userMatch = userArticles.filter(a => cat === 'general' || a.category === cat);
            const system = [
                { 
                    title: "El Arte de la Resiliencia: Filosofía Práctica para el Caos", 
                    description: "Cómo convertir el obstáculo en el camino según Marco Aurelio. Una guía profunda para blindar tu mente ante la adversidad moderna.", 
                    source: {name: "Filosofía Aplicada"}, 
                    image: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&q=80&w=800", 
                    category: "general", 
                    fullText: `
                        <p>La resiliencia no es simplemente la capacidad de "aguantar" los golpes de la vida, sino la habilidad de utilizar esa misma adversidad como combustible para el crecimiento personal. Hace más de 2000 años, los filósofos estoicos desarrollaron un sistema operativo mental precisamente para esto, y hoy es más relevante que nunca.</p>
                        
                        <h4>La Dicotomía del Control</h4>
                        <p>El pilar fundamental del estoicismo, articulado magistralmente por Epicteto, es la dicotomía del control. Su premisa es radicalmente simple: hay cosas que dependen de nosotros y cosas que no. Sufrimos cuando invertimos nuestra energía emocional en el segundo grupo.</p>
                        <ul>
                            <li><strong>Lo que controlas:</strong> Tus juicios, tus impulsos, tus deseos, tus aversiones. En resumen, tus propias acciones y reacciones mentales.</li>
                            <li><strong>Lo que NO controlas:</strong> El clima, la economía, las opiniones de los demás, el tráfico, la genética, el pasado.</li>
                        </ul>
                        <p>Al redirigir toda nuestra ansiedad hacia nuestra esfera de control, experimentamos una liberación inmediata. El estrés es, en gran medida, la fricción entre la realidad inamovible y nuestra exigencia ilusoria de querer controlarla.</p>
                        
                        <h4>Amor Fati: Amar el Destino</h4>
                        <p>Friedrich Nietzsche popularizó este concepto, aunque sus raíces son profundamente estoicas. <em>Amor Fati</em> no es resignación pasiva; es la aceptación entusiasta de todo lo que ocurre. Como decía el emperador romano Marco Aurelio: "El fuego brillante convierte en llama y resplandor todo lo que se le echa". Un obstáculo en el camino no bloquea el camino; se convierte en el camino.</p>
                        
                        <h4>Prácticas Diarias para Forjar Resiliencia</h4>
                        <p>La filosofía no debe quedarse en la teoría académica. El conocimiento sin aplicación es inútil. Aquí tienes ejercicios prácticos para integrar en tu día a día:</p>
                        <ul>
                            <li><strong>Incomodidad Voluntaria:</strong> Toma duchas frías, ayuna ocasionalmente o camina bajo la lluvia sin paraguas. Acostumbrar al cuerpo y a la mente a la incomodidad controlada reduce dramáticamente el miedo a perder las comodidades modernas.</li>
                            <li><strong>Premeditatio Malorum (Visualización Negativa):</strong> Dedica 5 minutos por la mañana a imaginar los peores escenarios posibles para tu día. Cuando (y si) ocurren, ya estarás preparado psicológicamente. Si no ocurren, sentirás una inmensa gratitud por la normalidad.</li>
                            <li><strong>El Diario Nocturno:</strong> Al final del día, reflexiona en silencio: ¿Qué hice mal hoy? ¿Qué hice bien? ¿Qué hábito o emoción me dominó? La autoconsciencia es el primer e indispensable paso hacia el autodominio.</li>
                        </ul>
                        <p>Recuerda que la tranquilidad mental no se logra huyendo de las tormentas, sino construyendo un barco capaz de navegar a través de ellas. La resiliencia se entrena todos los días.</p>
                    ` 
                },
                { 
                    title: "Neurociencia del Hábito: Reprogramando tu Cerebro", 
                    description: "La regla de los 21 días es un mito. Descubre la realidad científica sobre cómo se forman y destruyen los hábitos en tu red neuronal.", 
                    source: {name: "BrainHealth"}, 
                    image: "https://images.unsplash.com/photo-1559757175-5700dde675bc?auto=format&fit=crop&q=80&w=800", 
                    category: "health", 
                    fullText: `
                        <p>Durante décadas, los gurús de la autoayuda han repetido que se necesitan 21 días para formar un hábito. Esta idea nació de un malentendido de los estudios de cirugía plástica de Maxwell Maltz en los años 60. La ciencia actual, liderada por investigadores como Phillippa Lally del University College de Londres, nos dice algo muy diferente: en promedio, se necesitan 66 días para que un nuevo comportamiento se vuelva automático, variando entre 18 y 254 días dependiendo de la complejidad de la tarea.</p>
                        
                        <h4>El Bucle del Hábito y la Mielina</h4>
                        <p>Desde una perspectiva neurobiológica, un hábito no es más que una ruta neuronal fuertemente mielinizada. La mielina es una sustancia aislante que recubre los axones de las neuronas, permitiendo que las señales eléctricas viajen más rápido. Cuanto más repites una acción, más gruesa se vuelve esta capa. El proceso se divide en tres partes, popularizadas por Charles Duhigg:</p>
                        <ul>
                            <li><strong>La Señal (Cue):</strong> El detonante que le dice a tu cerebro que entre en modo automático. Puede ser una hora del día, un lugar o un estado emocional.</li>
                            <li><strong>La Rutina:</strong> El comportamiento en sí mismo, ya sea físico, mental o emocional.</li>
                            <li><strong>La Recompensa:</strong> El pico de dopamina o satisfacción que ayuda a tu cerebro a decidir si vale la pena recordar este bucle para el futuro.</li>
                        </ul>
                        
                        <h4>La Trampa de la Dopamina Barata</h4>
                        <p>En el entorno moderno, nuestro sistema de recompensas está secuestrado. Las redes sociales, la comida ultraprocesada y los videojuegos están diseñados para ofrecer recompensas masivas de dopamina sin requerir esfuerzo previo. Esto eleva nuestro umbral de tolerancia, haciendo que los "hábitos saludables" (como leer o hacer ejercicio), que ofrecen una liberación de dopamina más lenta y sostenida, parezcan aburridos en comparación.</p>
                        
                        <h4>Cómo Hackear tu Propio Sistema</h4>
                        <p>Para construir hábitos duraderos, no dependas de la motivación; la motivación es una emoción temporal. Depende del diseño de tu entorno:</p>
                        <ul>

                        <h4>Ser Rico vs. Ser Próspero (Wealth)</h4>
                        <p>Hay una diferencia fundamental que la sociedad suele ignorar. "Rico" (Rich) es un estado actual. Significa que tienes ingresos altos hoy para comprar coches caros o ropa de diseñador. "Prosperidad" o "Riqueza" (Wealth), por otro lado, es lo que no se ve. Es el dinero que no se ha gastado. Son los activos financieros, las inversiones y el capital no ejecutado.</p>
