<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Verificación de Google Search Console -->
    <meta name="google-site-verification" content="google05f4f150c76027da" />
    
    <title>Sapiens | Inteligencia Colectiva y Artificial</title>
    <meta name="description" content="Portal de sabiduría potenciado por IA y colaboración humana.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        h1, h2, h3, .serif { font-family: 'Libre+Baskerville', serif; }

        .article-content p { margin-bottom: 1.5rem; line-height: 1.8; color: #334155; font-size: 1.1rem; }
        .article-content h4 { font-weight: 700; color: #0d9488; margin-top: 2.5rem; margin-bottom: 1.25rem; font-size: 1.5rem; font-family: 'Libre+Baskerville', serif; }
        
        .ai-gradient {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
        }

        .ai-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(13, 148, 136, 0.1);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Navegación -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="loadCategory('general')">
                    <span class="text-3xl font-bold tracking-tighter text-teal-700 serif">Sapiens<span class="text-orange-500">.</span></span>
                </div>
                <div class="hidden md:flex space-x-8 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
                    <a href="#" onclick="loadCategory('general')" class="hover:text-teal-700 transition-colors">Inicio</a>
                    <a href="#" onclick="loadCategory('health')" class="hover:text-teal-700 transition-colors">Salud</a>
                    <a href="#" onclick="loadCategory('business')" class="hover:text-teal-700 transition-colors">Finanzas</a>
                    <a href="#" onclick="loadCategory('technology')" class="hover:text-teal-700 transition-colors">Tecnología</a>
                    <a href="#" onclick="showSection('publicar')" class="text-orange-500 hover:text-orange-600 transition-colors flex items-center">
                        <i class="fas fa-pen-nib mr-2"></i> Publicar
                    </a>
                </div>
                <div>
                    <button onclick="showSection('contacto')" class="bg-slate-900 text-white px-6 py-2.5 rounded-full text-xs font-bold hover:bg-teal-800 transition shadow-lg">Suscribirse</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- SECCIÓN: FEED -->
        <div id="section-home" class="page-section fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <!-- Columna de Artículos -->
                <div class="lg:col-span-8">
                    <div class="flex items-center justify-between mb-10 border-b border-slate-200 pb-4">
                        <h2 id="category-name" class="text-4xl font-bold text-slate-900 serif">Explora la Sabiduría</h2>
                        <span id="article-count" class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase">Cargando...</span>
                    </div>
                    <div id="news-grid" class="space-y-16"></div>
                </div>

                <!-- Barra Lateral IA MEJORADA -->
                <aside class="lg:col-span-4 space-y-8">
                    <div class="ai-card p-8 rounded-[2.5rem] shadow-2xl border-t-4 border-teal-500 sticky top-28">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-bold text-xl text-slate-900 serif">Oráculo IA</h3>
                            <span class="bg-teal-100 text-teal-700 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">v2.5 Enhanced</span>
                        </div>
                        
                        <!-- Controles de IA -->
                        <div class="flex gap-2 mb-4">
                            <button onclick="setAIMode('practical')" id="mode-practical" class="ai-mode-btn flex-1 py-2 text-[10px] font-bold rounded-xl bg-teal-600 text-white transition-all">PRÁCTICO</button>
                            <button onclick="setAIMode('philosophical')" id="mode-philosophical" class="ai-mode-btn flex-1 py-2 text-[10px] font-bold bg-slate-100 text-slate-500 rounded-xl hover:bg-slate-200 transition-all">FILOSÓFICO</button>
                            <button onclick="setAIMode('critical')" id="mode-critical" class="ai-mode-btn flex-1 py-2 text-[10px] font-bold bg-slate-100 text-slate-500 rounded-xl hover:bg-slate-200 transition-all">CRÍTICO</button>
                        </div>

                        <textarea id="ai-query" placeholder="¿En qué puedo ayudarte hoy?" class="w-full text-sm border-none bg-slate-50 rounded-2xl p-4 h-28 focus:ring-2 focus:ring-teal-500 outline-none mb-4 transition-all resize-none"></textarea>
                        
                        <button onclick="generateAICounsel()" id="ai-btn" class="w-full ai-gradient text-white py-4 rounded-2xl font-bold text-sm shadow-xl hover:shadow-teal-200 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-3">
                            <i class="fas fa-magic"></i>
                            <span>Consultar al Oráculo</span>
                        </button>

                        <!-- Contenedor de Respuesta IA -->
                        <div id="ai-loading" class="hidden mt-6 space-y-4">
                            <div class="h-4 w-3/4 loading-shimmer rounded"></div>
                            <div class="h-4 w-full loading-shimmer rounded"></div>
                            <div class="h-4 w-1/2 loading-shimmer rounded"></div>
                        </div>

                        <div id="ai-response-container" class="hidden mt-6 animate-fade-in">
                            <div id="ai-image-container" class="mb-4 rounded-2xl overflow-hidden h-40 bg-slate-100 hidden">
                                <img id="ai-generated-img" class="w-full h-full object-cover" src="" alt="Representación visual">
                            </div>
                            <div id="ai-response-text" class="text-sm text-slate-700 bg-white p-5 rounded-2xl border border-teal-50 italic leading-relaxed shadow-inner"></div>
                            <div class="mt-4 flex justify-between items-center">
                                <button onclick="saveCounsel()" class="text-[10px] font-bold text-teal-600 hover:text-teal-800 uppercase tracking-widest"><i class="far fa-bookmark mr-1"></i> Guardar</button>
                                <button onclick="clearAI()" class="text-[10px] font-bold text-slate-400 hover:text-red-400 uppercase tracking-widest">Limpiar</button>
                            </div>
                        </div>
                    </div>

                    <!-- Bitácora de Sabiduría (Historial local) -->
                    <div id="ai-history" class="hidden bg-slate-900 rounded-[2rem] p-6 text-white overflow-hidden relative">
                        <div class="relative z-10">
                            <h4 class="text-xs font-bold text-teal-400 uppercase tracking-[0.2em] mb-4">Bitácora Reciente</h4>
                            <div id="history-list" class="space-y-3 max-h-48 overflow-y-auto pr-2 custom-scrollbar"></div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>

        <!-- SECCIÓN PUBLICAR -->
        <div id="section-publicar" class="page-section hidden fade-in">
             <div class="max-w-3xl mx-auto bg-white p-10 md:p-16 rounded-[3rem] border border-slate-100 shadow-2xl">
                <div class="text-center mb-12">
                    <span class="text-orange-500 font-bold uppercase text-[10px] tracking-[0.3em]">Colaboración Abierta</span>
                    <h2 class="text-5xl font-bold serif mt-3 text-slate-900">Tu voz importa</h2>
                </div>
                <form id="form-publicar" class="space-y-8" onsubmit="handlePublish(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <input type="text" id="pub-title" required placeholder="Título" class="w-full border-b-2 border-slate-100 p-3 outline-none focus:border-teal-500 bg-transparent">
                        <select id="pub-cat" class="w-full border-b-2 border-slate-100 p-3 outline-none focus:border-teal-500 bg-transparent">
                            <option value="general">Sabiduría General</option>
                            <option value="health">Salud</option>
                            <option value="business">Finanzas</option>
                            <option value="technology">Tecnología</option>
                        </select>
                    </div>
                    <input type="text" id="pub-author" required placeholder="Tu Nombre" class="w-full border-b-2 border-slate-100 p-3 outline-none focus:border-teal-500 bg-transparent">
                    <textarea id="pub-text" required placeholder="Escribe aquí..." class="w-full border border-slate-100 bg-slate-50 p-6 rounded-3xl h-64 outline-none focus:border-teal-500"></textarea>
                    <button type="submit" class="w-full ai-gradient text-white font-bold py-5 rounded-3xl shadow-xl">Publicar Conocimiento</button>
                </form>
            </div>
        </div>

        <div id="section-article" class="page-section hidden fade-in">
            <div class="max-w-4xl mx-auto" id="full-article-content"></div>
        </div>

    </main>

    <footer class="bg-slate-900 text-white mt-32 py-20">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <span class="text-3xl font-bold serif text-teal-400">Sapiens<span class="text-orange-500">.</span></span>
            <p class="text-slate-500 mt-4 text-sm">© 2026 Inteligencia Aplicada para la Vida Moderna.</p>
        </div>
    </footer>

    <script>
        const API_KEY = ""; 
        let currentArticles = [];
        let userArticles = [];
        let aiMode = 'practical';
        let lastResponse = "";

        // --- MOTOR IA MEJORADO ---

        async function callGemini(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`;
            const payload = { 
                contents: [{ parts: [{ text: prompt }] }], 
                systemInstruction: { parts: [{ text: systemInstruction }] } 
            };
            
            let retries = 0;
            const maxRetries = 3;
            
            while(retries < maxRetries) {
                try {
                    const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    retries++;
                    await new Promise(r => setTimeout(r, 1000 * retries));
                }
            }
            return "El oráculo está meditando. Por favor, intenta de nuevo en un momento.";
        }

        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY}`;
            const payload = { instances: { prompt: `A sophisticated, minimalist artistic illustration for: ${prompt}. Cinematic lighting, soft teal and amber tones, high quality, editorial style.` }, parameters: { sampleCount: 1 } };
            
            try {
                const response = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            } catch (e) { return null; }
        }

        function setAIMode(mode) {
            aiMode = mode;
            document.querySelectorAll('.ai-mode-btn').forEach(b => {
                b.classList.remove('bg-teal-600', 'text-white');
                b.classList.add('bg-slate-100', 'text-slate-500');
            });
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.classList.remove('bg-slate-100', 'text-slate-500');
            activeBtn.classList.add('bg-teal-600', 'text-white');
        }

        async function generateAICounsel() {
            const query = document.getElementById('ai-query').value.trim();
            if (!query) return;

            const loading = document.getElementById('ai-loading');
            const container = document.getElementById('ai-response-container');
            const textDiv = document.getElementById('ai-response-text');
            const imgContainer = document.getElementById('ai-image-container');
            const imgEl = document.getElementById('ai-generated-img');
            const btn = document.getElementById('ai-btn');

            loading.classList.remove('hidden');
            container.classList.add('hidden');
            btn.disabled = true;

            const instructions = {
                practical: "Eres un mentor pragmático. Da consejos directos, accionables y con pasos numerados.",
                philosophical: "Eres un sabio estoico. Responde con metáforas, profundidad existencial y calma.",
                critical: "Eres un consultor escéptico. Analiza los riesgos, los puntos débiles y da una opinión honesta aunque sea dura."
            };

            const [advice, imageUrl] = await Promise.all([
                callGemini(query, instructions[aiMode]),
                generateImage(query)
            ]);

            lastResponse = advice;
            textDiv.innerHTML = advice.replace(/\n/g, '<br>');
            
            if (imageUrl) {
                imgEl.src = imageUrl;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            loading.classList.add('hidden');
            container.classList.remove('hidden');
            btn.disabled = false;
        }

        function saveCounsel() {
            const query = document.getElementById('ai-query').value;
            const historyList = document.getElementById('history-list');
            const historySection = document.getElementById('ai-history');
            
            historySection.classList.remove('hidden');
            const item = document.createElement('div');
            item.className = 'text-[11px] p-3 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 cursor-pointer transition';
            item.innerHTML = `<span class="text-teal-400 font-bold block mb-1">Q: ${query.substring(0, 30)}...</span> <span class="text-slate-400">${new Date().toLocaleTimeString()}</span>`;
            item.onclick = () => {
                document.getElementById('ai-query').value = query;
                document.getElementById('ai-response-text').innerHTML = lastResponse.replace(/\n/g, '<br>');
                document.getElementById('ai-response-container').classList.remove('hidden');
            };
            historyList.prepend(item);
        }

        function clearAI() {
            document.getElementById('ai-query').value = "";
            document.getElementById('ai-response-container').classList.add('hidden');
        }

        // --- GESTIÓN DE CONTENIDO ---

        function handlePublish(e) {
            e.preventDefault();
            const title = document.getElementById('pub-title').value;
            const text = document.getElementById('pub-text').value;
            const cat = document.getElementById('pub-cat').value;

            const newArticle = {
                title,
                description: text.substring(0, 150) + "...",
                source: { name: document.getElementById('pub-author').value },
                image: `https://images.unsplash.com/photo-${Math.floor(Math.random()*1000000)}?auto=format&fit=crop&q=80&w=800`,
                fullText: text.split('\n').map(p => `<p>${p}</p>`).join(''),
                category: cat,
                isUserPost: true
            };

            userArticles.unshift(newArticle);
            loadCategory(cat);
        }

        function renderArticles(articles) {
            currentArticles = articles;
            const grid = document.getElementById('news-grid');
            document.getElementById('article-count').innerText = `${articles.length} RECURSOS`;
            grid.innerHTML = '';

            articles.forEach((art, i) => {
                grid.innerHTML += `
                    <article class="group md:flex items-center gap-10">
                        <div class="md:w-5/12 overflow-hidden rounded-[2rem] aspect-[4/3] shadow-lg">
                            <img class="h-full w-full object-cover group-hover:scale-110 transition-transform duration-700" src="${art.image}">
                        </div>
                        <div class="md:w-7/12 py-4">
                            <div class="flex items-center space-x-3 mb-4">
                                <span class="text-[9px] ${art.isUserPost ? 'bg-orange-100 text-orange-600' : 'bg-teal-50 text-teal-600'} font-bold uppercase tracking-widest px-3 py-1 rounded-full">
                                    ${art.isUserPost ? 'Comunidad' : art.source.name}
                                </span>
                            </div>
                            <h3 class="text-3xl font-bold serif mb-4 text-slate-900 leading-snug">${art.title}</h3>
                            <p class="text-slate-500 text-sm line-clamp-2 mb-6">${art.description}</p>
                            <button onclick="readMore(${i})" class="text-slate-900 font-bold text-xs border-b-2 border-orange-400 pb-1 hover:text-teal-700 hover:border-teal-700 transition-all uppercase tracking-widest">Ver Guía</button>
                        </div>
                    </article>
                `;
            });
        }

        function readMore(index) {
            const art = currentArticles[index];
            const container = document.getElementById('full-article-content');
            container.innerHTML = `
                <button onclick="showSection('home')" class="mb-8 font-bold text-xs text-teal-600 uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                <img src="${art.image}" class="w-full h-[450px] object-cover rounded-[3rem] shadow-2xl mb-12">
                <h1 class="text-5xl font-bold serif mb-8 text-slate-900">${art.title}</h1>
                <div class="article-content">${art.fullText}</div>
            `;
            showSection('article');
        }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
        }

        function getMockArticles(cat) {
            const userMatch = userArticles.filter(a => cat === 'general' || a.category === cat);
            const system = [
                { 
                    title: "El Arte de la Resiliencia: Filosofía Práctica para el Caos", 
                    description: "Cómo convertir el obstáculo en el camino según Marco Aurelio. Una guía profunda para blindar tu mente ante la adversidad moderna.", 
                    source: {name: "Filosofía Aplicada"}, 
                    image: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&q=80&w=800", 
                    category: "general", 
                    fullText: `
                        <p>La resiliencia no es simplemente la capacidad de "aguantar" los golpes de la vida, sino la habilidad de utilizar esa misma adversidad como combustible para el crecimiento personal. Hace más de 2000 años, los filósofos estoicos desarrollaron un sistema operativo mental precisamente para esto, y hoy es más relevante que nunca.</p>
                        
                        <h4>La Dicotomía del Control</h4>
                        <p>El pilar fundamental del estoicismo, articulado magistralmente por Epicteto, es la dicotomía del control. Su premisa es radicalmente simple: hay cosas que dependen de nosotros y cosas que no.</p>
                        <ul>
                            <li><strong>Lo que controlas:</strong> Tus juicios, tus impulsos, tus deseos, tus aversiones.</li>
                            <li><strong>Lo que NO controlas:</strong> El clima, la economía, las opiniones de los demás.</li>
                        </ul>
                        <p>Al redirigir toda nuestra ansiedad hacia nuestra esfera de control, experimentamos una liberación inmediata.</p>
                        
                        <h4>Amor Fati: Amar el Destino</h4>
                        <p>Amor Fati no es resignación pasiva; es la aceptación entusiasta de todo lo que ocurre. Un obstáculo en el camino no bloquea el camino; se convierte en el camino.</p>
                        
                        <h4>Prácticas Diarias para Forjar Resiliencia</h4>
                        <ul>
                            <li><strong>Incomodidad Voluntaria:</strong> Toma duchas frías o ayuna ocasionalmente para fortalecer la mente.</li>
                            <li><strong>Premeditatio Malorum:</strong> Visualiza los peores escenarios para estar preparado psicológicamente.</li>
                            <li><strong>El Diario Nocturno:</strong> Reflexiona sobre tus acciones diarias para mejorar el autodominio.</li>
                        </ul>
                    ` 
                },
                { 
                    title: "Neurociencia del Hábito: Reprogramando tu Cerebro", 
                    description: "Descubre la realidad científica sobre cómo se forman y destruyen los hábitos en tu red neuronal.", 
                    source: {name: "BrainHealth"}, 
                    image: "https://images.unsplash.com/photo-1559757175-5700dde675bc?auto=format&fit=crop&q=80&w=800", 
                    category: "health", 
                    fullText: `
                        <p>En promedio, se necesitan 66 días para que un nuevo comportamiento se vuelva automático. Un hábito es una ruta neuronal fuertemente mielinizada.</p>
                        <h4>El Bucle del Hábito</h4>
                        <ul>
                            <li><strong>La Señal:</strong> El detonante del comportamiento.</li>
                            <li><strong>La Rutina:</strong> La acción realizada.</li>
                            <li><strong>La Recompensa:</strong> El pico de dopamina satisfactorio.</li>
                        </ul>
                        <h4>Hackear tu Sistema</h4>
                        <ul>
                            <li><strong>Fricción Ambiental:</strong> Facilita los buenos hábitos y dificulta los malos.</li>
                            <li><strong>Acumulación de Hábitos:</strong> Une un hábito nuevo a uno existente.</li>
                        </ul>
                    ` 
                },
                { 
                    title: "La Psicología del Dinero: Estrategias de Riqueza", 
                    description: "El éxito financiero no es una ciencia dura; es una habilidad blanda centrada en el comportamiento.", 
                    source: {name: "Capital Sapiens"}, 
                    image: "https://images.unsplash.com/photo-1611974714024-4607a5015a73?auto=format&fit=crop&q=80&w=800", 
                    category: "business", 
                    fullText: `
                        <p>La riqueza te otorga el activo más valioso de todos: el control sobre tu tiempo.</p>
                        <h4>Interés Compuesto</h4>
                        <p>La primera regla del interés compuesto es nunca interrumpirlo innecesariamente.</p>
                        <h4>Estrategias Asimétricas</h4>
                        <p>Busca oportunidades donde la pérdida esté limitada pero la ganancia potencial sea ilimitada.</p>
                    ` 
                },
                { 
                    title: "Simbiosis Cognitiva: Tu Cerebro en la Era de la IA", 
                    description: "Aprende a construir tu 'Segundo Cerebro' tecnológico para potenciar tu capacidad intelectual.", 
                    source: {name: "Tech Mastery"}, 
                    image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=800", 
                    category: "technology", 
                    fullText: `
                        <p>La IA no es solo software; es un exoesqueleto para la mente humana.</p>
                        <h4>De Creador a Curador</h4>
                        <p>El nuevo cuello de botella es la visión y la capacidad de discernimiento.</p>
                        <h4>Segundo Cerebro</h4>
                        <p>Externaliza tus notas y aprendizajes en una bóveda digital interconectada.</p>
                    ` 
                }
            ].filter(a => cat === 'general' ? true : a.category === cat);
            
            return [...userMatch, ...system];
        }

        function loadCategory(cat) {
            const titles = {general: "Sabiduría General", health: "Bienestar", business: "Finanzas", technology: "Futuro"};
            document.getElementById('category-name').innerText = titles[cat];
            renderArticles(getMockArticles(cat));
            showSection('home');
        }

        window.onload = () => loadCategory('general');
    </script>
</body>
</html>
